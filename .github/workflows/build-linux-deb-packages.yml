          chmod 0755 "$STAGE_DIR/usr/lib/wired3/wired3-bin"
          cp "${SWIFT_DEPS[@]}" "$STAGE_DIR/usr/lib/wired3/"
          cp "$DEFAULT_SPEC_SOURCE" "$STAGE_DIR/usr/share/wired3/wired.xml"
          cp "$DEFAULT_BANNER_SOURCE" "$STAGE_DIR/usr/share/wired3/banner.png"
          cp "$DEFAULT_CONFIG_SOURCE" "$STAGE_DIR/usr/share/wired3/config.ini.example"

