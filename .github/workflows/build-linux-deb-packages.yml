name: Build Linux Debian Packages

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (ex: 3.0)"
        required: true
      build_number:
        description: "Build number (ex: 4)"
        required: true
      server_commit:
        description: Server commit SHA (optional)
        required: false
      release_tag:
        description: "Release tag (ex: v3.0+4)"
        required: true
      package_name:
        description: Debian package name
        required: true
        default: wired3
      rpm_package_name:
        description: RPM package name
        required: false
        default: wired3
      rpm_version:
        description: RPM version base (without build number)
        required: false
        default: "3.0"
      rpm_release:
        description: RPM release number
        required: false
        default: "1"
      maintainer:
        description: Debian maintainer field
        required: true
        default: Wired Team <team@example.com>
      depends:
        description: Debian depends field
        required: true
        default: libc6
      service_enable:
        description: Install systemd unit (1/0)
        required: true
        default: "1"
      debian_artifact_name:
        description: Final workflow artifact name
        required: false
        default: linux-deb-packages
      rpm_enable:
        description: Build RPM packages (1/0)
        required: false
        default: "0"
      rpm_artifact_name:
        description: Final RPM workflow artifact name
        required: false
        default: linux-rpm-packages

jobs:
  build-amd64:
    name: Build deb amd64
    runs-on: ubuntu-latest
    container:
      image: swift:6.0-jammy
    defaults:
      run:
        shell: bash
    env:
      TARGET_ARCH: amd64
      FILE_ARCH_TOKEN: x86-64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as safe for Git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Checkout requested commit
        if: ${{ inputs.server_commit != '' }}
        run: git checkout "${{ inputs.server_commit }}"

      - name: Install build dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            file \
            dpkg-dev \
            rpm \
            liblz4-dev \
            libsqlite3-dev \
            libssl-dev \
            zlib1g-dev

      - name: Build and package
        run: |
          set -euo pipefail

          # Avoid linking sqlite3_snapshot_* on Linux system SQLite variants
          # that do not expose snapshot symbols.
          swift build -c release --product wired3 -Xswiftc -DGRDBCUSTOMSQLITE
          BIN_DIR="$(swift build -c release --show-bin-path)"
          BIN_PATH="$BIN_DIR/wired3"
          mapfile -t SWIFT_DEPS < <(ldd "$BIN_PATH" | awk '/=> \// {print $3}' | grep '/swift/' | sort -u)
          DEB_NAME="${{ inputs.package_name }}_${{ inputs.marketing_version }}+${{ inputs.build_number }}_${TARGET_ARCH}.deb"
          RPM_ARCH="x86_64"
          RPM_NAME="${{ inputs.rpm_package_name }}-${{ inputs.rpm_version }}+${{ inputs.build_number }}-${{ inputs.rpm_release }}.${RPM_ARCH}.rpm"
          STAGE_DIR="$GITHUB_WORKSPACE/.tmp/deb-stage-$TARGET_ARCH"
          OUT_DIR="$GITHUB_WORKSPACE/out-$TARGET_ARCH"
          VERIFY_DIR="$GITHUB_WORKSPACE/.tmp/verify-$TARGET_ARCH"
          OUT_DEB="$OUT_DIR/$DEB_NAME"
          OUT_RPM="$OUT_DIR/$RPM_NAME"
          DEFAULT_SPEC_SOURCE="$GITHUB_WORKSPACE/Sources/wired3/wired.xml"
          DEFAULT_BANNER_SOURCE="$GITHUB_WORKSPACE/Sources/wired3/banner.png"
          DEFAULT_CONFIG_SOURCE="$GITHUB_WORKSPACE/Sources/wired3/config.ini"

          file "$BIN_PATH"
          file "$BIN_PATH" | grep -q "$FILE_ARCH_TOKEN"
          ldd "$BIN_PATH" || true
          if [[ ${#SWIFT_DEPS[@]} -eq 0 ]]; then
            echo "No Swift runtime dependencies found in ldd output"
            ldd "$BIN_PATH" || true
            exit 1
          fi
          test -f "$DEFAULT_SPEC_SOURCE"
          test -f "$DEFAULT_BANNER_SOURCE"
          test -f "$DEFAULT_CONFIG_SOURCE"

          rm -rf "$STAGE_DIR" "$OUT_DIR" "$VERIFY_DIR"
          mkdir -p "$STAGE_DIR/DEBIAN" "$STAGE_DIR/usr/local/bin" "$STAGE_DIR/usr/lib/wired3" "$STAGE_DIR/usr/share/wired3" "$OUT_DIR" "$VERIFY_DIR"

          cp "$BIN_PATH" "$STAGE_DIR/usr/lib/wired3/wired3-bin"
          chmod 0755 "$STAGE_DIR/usr/lib/wired3/wired3-bin"
          cp "${SWIFT_DEPS[@]}" "$STAGE_DIR/usr/lib/wired3/"
          cp "$DEFAULT_SPEC_SOURCE" "$STAGE_DIR/usr/share/wired3/wired.xml"
          cp "$DEFAULT_BANNER_SOURCE" "$STAGE_DIR/usr/share/wired3/banner.png"
          cp "$DEFAULT_CONFIG_SOURCE" "$STAGE_DIR/usr/share/wired3/config.ini.example"

          cat > "$STAGE_DIR/usr/local/bin/wired3" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          export LD_LIBRARY_PATH="/usr/lib/wired3:${LD_LIBRARY_PATH:-}"
          exec /usr/lib/wired3/wired3-bin "$@"
          EOF
          chmod 0755 "$STAGE_DIR/usr/local/bin/wired3"

          sed \
            -e "s|__PACKAGE_NAME__|${{ inputs.package_name }}|g" \
            -e "s|__VERSION__|${{ inputs.marketing_version }}+${{ inputs.build_number }}|g" \
            -e "s|__ARCH__|$TARGET_ARCH|g" \
            -e "s|__MAINTAINER__|${{ inputs.maintainer }}|g" \
            -e "s|__DEPENDS__|${{ inputs.depends }}|g" \
            Scripts/debian/control.template > "$STAGE_DIR/DEBIAN/control"

          cp Scripts/debian/postinst "$STAGE_DIR/DEBIAN/postinst"
          cp Scripts/debian/prerm "$STAGE_DIR/DEBIAN/prerm"
          chmod 0755 "$STAGE_DIR/DEBIAN/postinst" "$STAGE_DIR/DEBIAN/prerm"

          if [[ "${{ inputs.service_enable }}" == "1" ]]; then
            mkdir -p "$STAGE_DIR/lib/systemd/system"
            cp Scripts/debian/wired3.service "$STAGE_DIR/lib/systemd/system/wired3.service"
          fi

          dpkg-deb --build --root-owner-group "$STAGE_DIR" "$OUT_DEB"
          dpkg-deb -x "$OUT_DEB" "$VERIFY_DIR"
          file "$VERIFY_DIR/usr/lib/wired3/wired3-bin"
          file "$VERIFY_DIR/usr/lib/wired3/wired3-bin" | grep -q "$FILE_ARCH_TOKEN"

          if [[ "${{ inputs.rpm_enable }}" == "1" ]]; then
            RPM_ROOT="$GITHUB_WORKSPACE/.tmp/rpm-root-$TARGET_ARCH"
            RPMBUILD_DIR="$GITHUB_WORKSPACE/.tmp/rpmbuild-$TARGET_ARCH"
            RPM_SOURCES_DIR="$RPMBUILD_DIR/SOURCES"
            RPM_SPECS_DIR="$RPMBUILD_DIR/SPECS"
            RPM_BUILDROOT_DIR="$RPMBUILD_DIR/BUILDROOT"
            SPEC_PATH="$RPM_SPECS_DIR/${{ inputs.rpm_package_name }}.spec"

            rm -rf "$RPM_ROOT" "$RPMBUILD_DIR"
            mkdir -p "$RPM_ROOT/usr/local/bin" "$RPM_ROOT/usr/lib/wired3" "$RPM_ROOT/usr/share/wired3" "$RPM_ROOT/usr/lib/systemd/system"
            mkdir -p "$RPMBUILD_DIR/BUILD" "$RPMBUILD_DIR/RPMS" "$RPMBUILD_DIR/SRPMS" "$RPM_SOURCES_DIR" "$RPM_SPECS_DIR" "$RPM_BUILDROOT_DIR"

            cp "$STAGE_DIR/usr/local/bin/wired3" "$RPM_ROOT/usr/local/bin/wired3"
            cp -a "$STAGE_DIR/usr/lib/wired3/." "$RPM_ROOT/usr/lib/wired3/"
            cp "$STAGE_DIR/usr/share/wired3/wired.xml" "$RPM_ROOT/usr/share/wired3/wired.xml"
            cp "$STAGE_DIR/usr/share/wired3/banner.png" "$RPM_ROOT/usr/share/wired3/banner.png"
            cp "$STAGE_DIR/usr/share/wired3/config.ini.example" "$RPM_ROOT/usr/share/wired3/config.ini.example"
            cp "$GITHUB_WORKSPACE/Scripts/debian/wired3.service" "$RPM_ROOT/usr/lib/systemd/system/wired3.service"

            tar -C "$RPM_ROOT" -czf "$RPM_SOURCES_DIR/rootfs.tar.gz" .

            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -euo pipefail' \
              'if ! getent group wired3 >/dev/null 2>&1; then' \
              '  groupadd --system wired3' \
              'fi' \
              'if ! id -u wired3 >/dev/null 2>&1; then' \
              '  useradd --system --gid wired3 --home-dir /var/lib/wired3 --create-home --shell /usr/sbin/nologin --comment "Wired 3 service account" wired3' \
              'fi' \
              'install -d -m 0750 -o wired3 -g wired3 /var/lib/wired3' \
              'install -d -m 0755 /etc/wired3' \
              '[[ -f /var/lib/wired3/wired.xml ]] || install -m 0640 -o wired3 -g wired3 /usr/share/wired3/wired.xml /var/lib/wired3/wired.xml' \
              '[[ -f /var/lib/wired3/banner.png ]] || install -m 0644 -o wired3 -g wired3 /usr/share/wired3/banner.png /var/lib/wired3/banner.png' \
              '[[ -f /etc/wired3/config.ini ]] || install -m 0640 -o root -g wired3 /usr/share/wired3/config.ini.example /etc/wired3/config.ini' \
              'if command -v systemctl >/dev/null 2>&1; then' \
              '  systemctl daemon-reload || true' \
              'fi' \
              > "$RPM_SOURCES_DIR/post.sh"
            chmod 0755 "$RPM_SOURCES_DIR/post.sh"

            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -euo pipefail' \
              'if command -v systemctl >/dev/null 2>&1; then' \
              '  systemctl stop wired3.service >/dev/null 2>&1 || true' \
              '  systemctl disable wired3.service >/dev/null 2>&1 || true' \
              'fi' \
              > "$RPM_SOURCES_DIR/preun.sh"
            chmod 0755 "$RPM_SOURCES_DIR/preun.sh"

            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -euo pipefail' \
              'if command -v systemctl >/dev/null 2>&1; then' \
              '  systemctl daemon-reload || true' \
              'fi' \
              > "$RPM_SOURCES_DIR/postun.sh"
            chmod 0755 "$RPM_SOURCES_DIR/postun.sh"

            printf '%s\n' \
              "Name:           ${{ inputs.rpm_package_name }}" \
              "Version:        ${{ inputs.rpm_version }}+${{ inputs.build_number }}" \
              "Release:        ${{ inputs.rpm_release }}" \
              "Summary:        Wired 3 server daemon" \
              "License:        Proprietary" \
              "BuildArch:      ${RPM_ARCH}" \
              "Source0:        rootfs.tar.gz" \
              "Source1:        post.sh" \
              "Source2:        preun.sh" \
              "Source3:        postun.sh" \
              "" \
              "%description" \
              "Wired 3 server packaged for RPM-based distributions." \
              "" \
              "%prep" \
              "%setup -q -c -T" \
              "tar -xzf %{SOURCE0} -C ." \
              "" \
              "%build" \
              "" \
              "%install" \
              "mkdir -p %{buildroot}" \
              "cp -a . %{buildroot}/" \
              "" \
              "%post -p /bin/bash" \
              "%{SOURCE1}" \
              "" \
              "%preun -p /bin/bash" \
              "%{SOURCE2}" \
              "" \
              "%postun -p /bin/bash" \
              "%{SOURCE3}" \
              "" \
              "%files" \
              "/usr/local/bin/wired3" \
              "/usr/lib/wired3" \
              "/usr/share/wired3" \
              "/usr/lib/systemd/system/wired3.service" \
              > "$SPEC_PATH"

            rpmbuild -bb "$SPEC_PATH" \
              --define "_topdir $RPMBUILD_DIR" \
              --define "dist %{nil}"
            cp "$RPMBUILD_DIR/RPMS/$RPM_ARCH/"*.rpm "$OUT_RPM"
            file "$OUT_RPM" | grep -Eq "x86_64|x86-64"
          fi

      - name: Upload arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-amd64
          path: out-amd64/*.deb
          if-no-files-found: error

      - name: Upload RPM arch artifact
        if: ${{ inputs.rpm_enable == '1' }}
        uses: actions/upload-artifact@v4
        with:
          name: rpm-amd64
          path: out-amd64/*.rpm
          if-no-files-found: error

  build-arm64:
    name: Build deb arm64
    runs-on: ubuntu-24.04-arm
    container:
      image: swift:6.0-jammy
    defaults:
      run:
        shell: bash
    env:
      TARGET_ARCH: arm64
      FILE_ARCH_TOKEN: aarch64
    steps:
      - name: Checkout
