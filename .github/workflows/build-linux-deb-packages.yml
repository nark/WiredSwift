          DEB_NAME="${{ inputs.package_name }}_${{ inputs.marketing_version }}+${{ inputs.build_number }}_${TARGET_ARCH}.deb"
          RPM_ARCH="aarch64"
          RPM_NAME="${{ inputs.rpm_package_name }}-${{ inputs.rpm_version }}+${{ inputs.build_number }}-${{ inputs.rpm_release }}.${RPM_ARCH}.rpm"
          STAGE_DIR="$GITHUB_WORKSPACE/.tmp/deb-stage-$TARGET_ARCH"
          OUT_DIR="$GITHUB_WORKSPACE/out-$TARGET_ARCH"
          VERIFY_DIR="$GITHUB_WORKSPACE/.tmp/verify-$TARGET_ARCH"
          OUT_DEB="$OUT_DIR/$DEB_NAME"
          OUT_RPM="$OUT_DIR/$RPM_NAME"
          DEFAULT_SPEC_SOURCE="$GITHUB_WORKSPACE/Sources/wired3/wired.xml"
          DEFAULT_BANNER_SOURCE="$GITHUB_WORKSPACE/Sources/wired3/banner.png"
          DEFAULT_CONFIG_SOURCE="$GITHUB_WORKSPACE/Sources/wired3/config.ini"

          file "$BIN_PATH"
          file "$BIN_PATH" | grep -q "$FILE_ARCH_TOKEN"
          ldd "$BIN_PATH" || true
