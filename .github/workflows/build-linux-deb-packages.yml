  assemble-artifacts:
    name: Assemble deb artifacts
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-amd64
          path: out

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-arm64
          path: out

      - name: Download amd64 RPM artifact
        if: ${{ inputs.rpm_enable == '1' }}
        uses: actions/download-artifact@v4
        with:
          name: rpm-amd64
          path: out

      - name: Download arm64 RPM artifact
        if: ${{ inputs.rpm_enable == '1' }}
        uses: actions/download-artifact@v4
        with:
          name: rpm-arm64
          path: out

      - name: Verify expected filenames
        run: |
          set -euo pipefail
          ls -la out
          test -f "out/${{ inputs.package_name }}_${{ inputs.marketing_version }}+${{ inputs.build_number }}_amd64.deb"
          test -f "out/${{ inputs.package_name }}_${{ inputs.marketing_version }}+${{ inputs.build_number }}_arm64.deb"
          if [[ "${{ inputs.rpm_enable }}" == "1" ]]; then
            test -f "out/${{ inputs.rpm_package_name }}-${{ inputs.rpm_version }}+${{ inputs.build_number }}-${{ inputs.rpm_release }}.x86_64.rpm"
            test -f "out/${{ inputs.rpm_package_name }}-${{ inputs.rpm_version }}+${{ inputs.build_number }}-${{ inputs.rpm_release }}.aarch64.rpm"
          fi

      - name: Upload final artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.debian_artifact_name }}
          path: out/*.deb
          if-no-files-found: error

      - name: Upload final RPM artifact bundle
        if: ${{ inputs.rpm_enable == '1' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.rpm_artifact_name }}
          path: out/*.rpm
          if-no-files-found: error
