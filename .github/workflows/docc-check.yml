name: DocC Check

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: docc-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docc-check:
    name: Generate DocC (macOS)
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-docc-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-docc-
            ${{ runner.os }}-swiftpm-

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Generate DocC
        run: swift package generate-documentation --target WiredSwift
