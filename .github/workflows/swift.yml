name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    env:
      SWIFT_BACKTRACE: enable=yes,output-to=stderr,interactive=no

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Swift Version
        run: swift --version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --reporter github-actions-logging

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build wired3
        run: swift build -v --product wired3

      - name: Build WiredChatBot
        run: swift build -v --product WiredChatBot

      - name: Test
        run: |
          set -euo pipefail
          LOG_FILE=".build/swift-test.log"
          if ! swift test -v --enable-code-coverage --xunit-output .build/test-results.xunit 2>&1 | tee "${LOG_FILE}"; then
            echo "::group::Last 300 lines of swift test log"
            tail -n 300 "${LOG_FILE}" || true
            echo "::endgroup::"

            echo "::group::Crash and error markers"
            if command -v rg >/dev/null 2>&1; then
              rg -n "fatal error|Unexpectedly found nil|signal code|error:" "${LOG_FILE}" || true
            else
              grep -nE "fatal error|Unexpectedly found nil|signal code|error:" "${LOG_FILE}" || true
            fi
            echo "::endgroup::"

            echo "::group::DiagnosticReports listing"
            ls -lah ~/Library/Logs/DiagnosticReports || true
            echo "::endgroup::"

            exit 1
          fi

      - name: Coverage summary
        if: always()
        run: |
          set -euo pipefail

          PROFILE_PATH="$(find .build -type f -name "*.profdata" | head -n 1 || true)"
          TEST_BINARY="$(find .build -type f -path "*/WiredSwiftPackageTests.xctest/Contents/MacOS/WiredSwiftPackageTests" | head -n 1 || true)"

          if [[ -z "${PROFILE_PATH}" || -z "${TEST_BINARY}" ]]; then
            {
              echo "## Coverage"
              echo
              echo "Coverage artifacts not found (profile: \`${PROFILE_PATH:-none}\`, binary: \`${TEST_BINARY:-none}\`)."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if ! xcrun llvm-cov report \
            "${TEST_BINARY}" \
            -instr-profile "${PROFILE_PATH}" \
            > .build/coverage-report.txt; then
            {
              echo "## Coverage"
              echo
              echo "Failed to compute coverage report."
              echo
              echo "- profile: \`${PROFILE_PATH}\`"
              echo "- binary: \`${TEST_BINARY}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if ! xcrun llvm-cov export \
            "${TEST_BINARY}" \
            -instr-profile "${PROFILE_PATH}" \
            > .build/coverage-export.json; then
            {
              echo "## Coverage"
              echo
              echo "Failed to export JSON coverage report."
              echo
              echo "- profile: \`${PROFILE_PATH}\`"
              echo "- binary: \`${TEST_BINARY}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          read -r PROJECT_LINE_PCT PROJECT_REGION_PCT PROJECT_LINE_COVERED PROJECT_LINE_COUNT <<< "$(python3 -c 'import json; d=json.load(open(".build/coverage-export.json")); files=d.get("data",[{}])[0].get("files",[]); inc=("/Sources/WiredSwift/","/Sources/wired3/"); sel=[e for e in files if any(m in e.get("filename","") for m in inc)]; lc=sum(int(e.get("summary",{}).get("lines",{}).get("count",0)) for e in sel); cc=sum(int(e.get("summary",{}).get("lines",{}).get("covered",0)) for e in sel); rc=sum(int(e.get("summary",{}).get("regions",{}).get("count",0)) for e in sel); cr=sum(int(e.get("summary",{}).get("regions",{}).get("covered",0)) for e in sel); lp=(cc*100.0/lc) if lc else 0.0; rp=(cr*100.0/rc) if rc else 0.0; print(f"{lp:.2f} {rp:.2f} {cc} {lc}")')"

          COVERAGE_MIN=50.00
          COVERAGE_STATUS="pass"
          if ! awk "BEGIN { exit !(${PROJECT_LINE_PCT} >= ${COVERAGE_MIN}) }"; then
            COVERAGE_STATUS="fail"
          fi

          TOTAL_LINE="$(grep -E "^TOTAL" .build/coverage-report.txt || true)"

          {
            echo "## Coverage"
            echo
            echo "**Project sources coverage** (\`Sources/WiredSwift\` + \`Sources/wired3\`)"
            echo
            echo "- Line coverage: \`${PROJECT_LINE_PCT}%\` (\`${PROJECT_LINE_COVERED}/${PROJECT_LINE_COUNT}\`)"
            echo "- Region coverage: \`${PROJECT_REGION_PCT}%\`"
            echo "- Minimum target: \`${COVERAGE_MIN}%\`"
            echo "- Status: \`${COVERAGE_STATUS}\`"
            echo
            echo "**Raw llvm-cov TOTAL** (includes dependencies/checkouts)"
            echo
            if [[ -n "${TOTAL_LINE}" ]]; then
              echo "\`${TOTAL_LINE}\`"
            else
              echo "No TOTAL line found in llvm-cov output."
            fi
            echo
            echo "<details><summary>Per-file coverage (llvm-cov report)</summary>"
            echo
            echo '```text'
            cat .build/coverage-report.txt
            echo '```'
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${COVERAGE_STATUS}" == "fail" ]]; then
            echo "Project line coverage (${PROJECT_LINE_PCT}%) is below ${COVERAGE_MIN}%."
            exit 1
          fi

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            .build/swift-test.log
            .build/test-results.xunit
            .build/coverage-report.txt
            .build/coverage-export.json
            .build/**/codecov/*.profdata
            .build/**/codecov/*
            ~/Library/Logs/DiagnosticReports/*.crash
            ~/Library/Logs/DiagnosticReports/*.ips

  build-linux:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0-jammy
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: linux-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: linux-swiftpm-

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build wired3
        run: swift build --product wired3

      - name: Build WiredChatBot
        run: swift build --product WiredChatBot

      - name: Test
        run: swift test
