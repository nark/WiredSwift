name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    env:
      SWIFT_BACKTRACE: enable=yes,output-to=stderr,interactive=no

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build wired3
        run: swift build -v --product wired3

      - name: Build WiredChatBot
        run: swift build -v --product WiredChatBot

      - name: Test
        run: |
          set -euo pipefail
          LOG_FILE=".build/swift-test.log"
          if ! swift test -v --enable-code-coverage --xunit-output .build/test-results.xunit 2>&1 | tee "${LOG_FILE}"; then
            echo "::group::Last 300 lines of swift test log"
            tail -n 300 "${LOG_FILE}" || true
            echo "::endgroup::"

            echo "::group::Crash and error markers"
            if command -v rg >/dev/null 2>&1; then
              rg -n "fatal error|Unexpectedly found nil|signal code|error:" "${LOG_FILE}" || true
            else
              grep -nE "fatal error|Unexpectedly found nil|signal code|error:" "${LOG_FILE}" || true
            fi
            echo "::endgroup::"

            echo "::group::DiagnosticReports listing"
            ls -lah ~/Library/Logs/DiagnosticReports || true
            echo "::endgroup::"

            exit 1
          fi

      - name: Coverage summary
        if: always()
        run: |
          set -euo pipefail

          PROFILE_PATH="$(find .build -type f -name "*.profdata" | head -n 1 || true)"
          TEST_BINARY="$(find .build -type f -path "*/WiredSwiftPackageTests.xctest/Contents/MacOS/WiredSwiftPackageTests" | head -n 1 || true)"

          if [[ -z "${PROFILE_PATH}" || -z "${TEST_BINARY}" ]]; then
            {
              echo "## Coverage"
              echo
              echo "Coverage artifacts not found (profile: \`${PROFILE_PATH:-none}\`, binary: \`${TEST_BINARY:-none}\`)."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if ! xcrun llvm-cov report \
            "${TEST_BINARY}" \
            -instr-profile "${PROFILE_PATH}" \
            > .build/coverage-report.txt; then
            {
              echo "## Coverage"
              echo
              echo "Failed to compute coverage report."
              echo
              echo "- profile: \`${PROFILE_PATH}\`"
              echo "- binary: \`${TEST_BINARY}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if ! xcrun llvm-cov export \
            "${TEST_BINARY}" \
            -instr-profile "${PROFILE_PATH}" \
            > .build/coverage-export.json; then
            {
              echo "## Coverage"
              echo
              echo "Failed to export JSON coverage report."
              echo
              echo "- profile: \`${PROFILE_PATH}\`"
              echo "- binary: \`${TEST_BINARY}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          PROJECT_COVERAGE_JSON="$(python3 - <<'PY'
import json
from pathlib import Path

path = Path(".build/coverage-export.json")
data = json.loads(path.read_text())
files = data.get("data", [{}])[0].get("files", [])

included = ("/Sources/WiredSwift/", "/Sources/wired3/")
line_count = 0
line_covered = 0
region_count = 0
region_covered = 0

for entry in files:
    filename = entry.get("filename", "")
    if not any(marker in filename for marker in included):
        continue
    summary = entry.get("summary", {})
    lines = summary.get("lines", {})
    regions = summary.get("regions", {})
    line_count += int(lines.get("count", 0))
    line_covered += int(lines.get("covered", 0))
    region_count += int(regions.get("count", 0))
    region_covered += int(regions.get("covered", 0))

line_pct = (line_covered * 100.0 / line_count) if line_count else 0.0
region_pct = (region_covered * 100.0 / region_count) if region_count else 0.0

print(json.dumps({
    "line_pct": line_pct,
    "region_pct": region_pct,
    "line_covered": line_covered,
    "line_count": line_count
}))
PY
)"

          PROJECT_LINE_PCT="$(python3 - <<'PY' "${PROJECT_COVERAGE_JSON}"
import json, sys
print(f"{json.loads(sys.argv[1])['line_pct']:.2f}")
PY
)"
          PROJECT_REGION_PCT="$(python3 - <<'PY' "${PROJECT_COVERAGE_JSON}"
import json, sys
print(f"{json.loads(sys.argv[1])['region_pct']:.2f}")
PY
)"
          PROJECT_LINE_COVERED="$(python3 - <<'PY' "${PROJECT_COVERAGE_JSON}"
import json, sys
print(json.loads(sys.argv[1])['line_covered'])
PY
)"
          PROJECT_LINE_COUNT="$(python3 - <<'PY' "${PROJECT_COVERAGE_JSON}"
import json, sys
print(json.loads(sys.argv[1])['line_count'])
PY
)"

          COVERAGE_MIN=50.00
          COVERAGE_STATUS="pass"
          if ! python3 - <<'PY' "${PROJECT_LINE_PCT}" "${COVERAGE_MIN}"
import sys
line_pct = float(sys.argv[1])
minimum = float(sys.argv[2])
sys.exit(0 if line_pct >= minimum else 1)
PY
          then
            COVERAGE_STATUS="fail"
          fi

          TOTAL_LINE="$(grep -E "^TOTAL" .build/coverage-report.txt || true)"

          {
            echo "## Coverage"
            echo
            echo "**Project sources coverage** (\`Sources/WiredSwift\` + \`Sources/wired3\`)"
            echo
            echo "- Line coverage: \`${PROJECT_LINE_PCT}%\` (\`${PROJECT_LINE_COVERED}/${PROJECT_LINE_COUNT}\`)"
            echo "- Region coverage: \`${PROJECT_REGION_PCT}%\`"
            echo "- Minimum target: \`${COVERAGE_MIN}%\`"
            echo "- Status: \`${COVERAGE_STATUS}\`"
            echo
            echo "**Raw llvm-cov TOTAL** (includes dependencies/checkouts)"
            echo
            if [[ -n "${TOTAL_LINE}" ]]; then
              echo "\`${TOTAL_LINE}\`"
            else
              echo "No TOTAL line found in llvm-cov output."
            fi
            echo
            echo "<details><summary>Per-file coverage (llvm-cov report)</summary>"
            echo
            echo '```text'
            cat .build/coverage-report.txt
            echo '```'
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${COVERAGE_STATUS}" == "fail" ]]; then
            echo "Project line coverage (${PROJECT_LINE_PCT}%) is below ${COVERAGE_MIN}%."
            exit 1
          fi

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            .build/swift-test.log
            .build/test-results.xunit
            .build/coverage-report.txt
            .build/coverage-export.json
            .build/**/codecov/*.profdata
            .build/**/codecov/*
            ~/Library/Logs/DiagnosticReports/*.crash
            ~/Library/Logs/DiagnosticReports/*.ips
