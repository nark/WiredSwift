name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build wired3
        run: swift build -v --product wired3

      - name: Build WiredChatBot
        run: swift build -v --product WiredChatBot

      - name: Test (Unit)
        run: |
          set -euo pipefail
          swift test -v --no-parallel --filter "^(WiredSwiftTests|wired3Tests)\\."

      - name: Test (Integration Lot 1)
        run: |
          set -euo pipefail
          swift test -v --no-parallel --filter "^wired3IntegrationTests\\.Lot1HandshakeAuthIntegrationTests\\."

      - name: Test (Integration Lot 2)
        run: |
          set -euo pipefail
          swift test -v --no-parallel --filter "^wired3IntegrationTests\\.Lot2FeatureIntegrationTests\\."

      - name: Test (Integration Lot 3)
        run: |
          set -euo pipefail
          swift test -v --no-parallel --filter "^wired3IntegrationTests\\.Lot3ResilienceIntegrationTests\\."
