name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (macOS)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Swift Version
        run: swift --version

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Build wired3
        run: swift build -v --product wired3

      - name: Build WiredChatBot
        run: swift build -v --product WiredChatBot

      - name: Test
        run: |
          set -euo pipefail
          LOG_FILE=".build/swift-test.log"
          if ! swift test -v --xunit-output .build/test-results.xunit 2>&1 | tee "${LOG_FILE}"; then
            echo "::group::Last 300 lines of swift test log"
            tail -n 300 "${LOG_FILE}" || true
            echo "::endgroup::"

            echo "::group::Crash and error markers"
            rg -n "fatal error|Unexpectedly found nil|signal code|error:" "${LOG_FILE}" || true
            echo "::endgroup::"

            echo "::group::DiagnosticReports listing"
            ls -lah ~/Library/Logs/DiagnosticReports || true
            echo "::endgroup::"

            exit 1
          fi

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swift-test-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            .build/swift-test.log
            .build/test-results.xunit
            ~/Library/Logs/DiagnosticReports/*.crash
