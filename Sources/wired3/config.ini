[transfers]
downloads = 10
downloadSpeed = 0
uploadSpeed = 0
uploads = 10

[server]
banner = banner.png
files = files
name = Local Dev server 3.0
description = Welcome to Wired Server 3.0
port = 4871

[settings]
trackers = ["wired.read-write.fr"]
; Periodic full reindex interval in seconds (default: 3600 = 1 hour).
; Set to 0 to disable. Minimum: 60 seconds.
; File operations (upload, delete, move) always update the index immediately.
reindex_interval = 3600

[advanced]
compression = ALL
cipher = SECURE_ONLY
checksum = SECURE_ONLY

[security]
; Trust On First Use (TOFU) — persistent server identity key.
; When strict_identity = yes (default), clients MUST abort if the server's
; identity key changes since the last connection (possible MITM attack).
; Set to no to allow clients to silently update the stored fingerprint
; (useful during server migration or key rotation, then re-enable).
strict_identity = yes
