[changelog]
header = """
# Changelog

All notable changes to WiredSwift are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/nark/WiredSwift/commit/{{ commit.id }}))\
{% if commit.breaking %} ⚠️ **BREAKING**{% endif %}

{% endfor %}\
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Map commit types to changelog sections
commit_parsers = [
  { message = "^feat",              group = "Features"       },
  { message = "^fix",               group = "Bug Fixes"      },
  { message = "^perf",              group = "Performance"    },
  { message = "^refactor",          group = "Refactoring"    },
  { message = "^test",              group = "Testing"        },
  { message = "^docs",              group = "Documentation"  },
  { message = "^build",             skip  = true             },
  { message = "^chore\\(release\\)", skip  = true             },
  { message = "^chore\\(lint\\)",    skip  = true             },
  { message = "^chore\\(dx\\)",      skip  = true             },
  { message = "^chore",             skip  = true             },
  { message = "^ci",                skip  = true             },
  { message = "^style",             skip  = true             },
]

filter_commits = true

# Tag pattern matching your versioning: v3.0+3, v3.0-beta.15+28
tag_pattern = "v[0-9]+\\.[0-9]+.*"

# Ignore the build number suffix in sort (treat v3.0+3 < v3.0+4)
topo_order = false
sort_commits = "newest"

[remote.github]
owner = "nark"
repo  = "WiredSwift"
